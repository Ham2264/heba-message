<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسالة لغلا</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* البداية */
#start { margin-top: 120px; }

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* السؤال */
#question { margin-top: 120px; }

/* أزرار */
.option-btn {
  display: block;
  margin: 10px auto;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

/* الرسالة */
.message-box {
  margin-top: 90px;
  padding: 25px;
  width: 65%;
  margin-left: auto;
  margin-right: auto;
  border-radius: 25px;
  border: 2px solid #ff6f91;
  background: rgba(255,105,135,0.1);
  box-shadow: 0 0 25px rgba(255,100,150,0.4);
}

/* المؤثرات */
#fx {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

.fx-item {
  position: absolute;
  animation: fall 5s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
}
</style>
</head>

<body>

<div id="start">
  <h1>غلا… 💌</h1>
  <p>عندي لك شي بسيط</p>
  <button onclick="start()">ابدئي</button>
</div>

<div id="quiz" style="display:none;">
  <h2 id="q"></h2>
  <div id="opts"></div>
</div>

<div id="final" style="display:none;">
  <div class="message-box">
    <h2>💖 رسالة لك يا غلا</h2>
    <p id="msg"></p>
  </div>

  <div id="fx"></div>
</div>

<script>

let i=0;

function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("quiz").style.display="block";
  showQ();
}

const qs=[
  {q:"وش يريح غلا؟",o:["هدوء 🌙","ضحك 😂","كلام 💬"]},
  {q:"لو زعلت؟",o:["أحد يسمع 🤍","أحد يضحكها ✨","اهتمام 🌸"]},
  {q:"وش تحب؟",o:["الاهتمام 💖","الصدق 🌿","الطيبة ☁️"]}
];

let c=0;

function showQ(){
  let q=qs[c];
  document.getElementById("q").innerHTML=q.q;

  let html="";
  q.o.forEach(x=>{
    html+=`<button class="option-btn" onclick="next()">${x}</button>`;
  });

  document.getElementById("opts").innerHTML=html;
}

function next(){
  c++;
  if(c>=qs.length) final();
  else showQ();
}

function final(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("final").style.display="block";

  let text=`غلا…
وجودك مو شي عادي 🤍

أنتِ قريبة لقلبي كأنك أختي 🌸
وأهتم فيك بدون ما أحس…

وأتمنى دايم أكون الشي
اللي يريحك 💫`;

  type(text);
  startFX();
}

function type(t){
  if(i<t.length){
    document.getElementById("msg").innerHTML+=t.charAt(i);
    i++;
    setTimeout(()=>type(t),30);
  }
}

/* المؤثرات */
function startFX(){

  const fx=document.getElementById("fx");
  const items=["💖","🌸","🦋","✨","🌹","💫"];

  setInterval(()=>{
    let el=document.createElement("div");
    el.className="fx-item";
    el.innerHTML=items[Math.floor(Math.random()*items.length)];

    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(18+Math.random()*25)+"px";

    fx.appendChild(el);

    setTimeout(()=>el.remove(),5000);
  },150);
}

</script>

</body>
</html>
